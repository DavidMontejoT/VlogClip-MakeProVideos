# ============================================================
# Configuración de clips a extraer
# Editá este archivo y después ejecutá: ./run.sh
# ============================================================

# URL del video de YouTube
URL="https://www.youtube.com/watch?v=b4WMy9H4nUI"

# Modo de extracción:
#   sections  → baja solo los fragmentos necesarios (mejor para pocos clips)
#   full      → baja el video entero una vez y corta todos los clips (mejor para muchos clips)
MODO="sections"

# ─── Clips a extraer ───────────────────────────────────────
# Formato: "INICIO DURACION ETIQUETA"
#
# INICIO:   segundos (9158) o h:mm:ss (2:32:38)
# DURACION: segundos que dura el clip
# ETIQUETA: nombre descriptivo sin espacios (se usa en el nombre del archivo)
#
# Ejemplos:
CLIPS=(
  "2:19:59 1029 clip_principal"
)
#
# Podés agregar todos los que quieras, uno por línea.
